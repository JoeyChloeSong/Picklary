name: PickleLevel update agent

on:
  workflow_dispatch:
  schedule:
    # Twice a day in UTC. Adjust after you know your traffic/update pattern.
    - cron: '15 0,12 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run PickleLevel update agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          npm run agent:scan
          npm run agent:publish
          npm run build

      - name: Create review pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: update PickleLevel agent drafts'
          title: 'PickleLevel update agent drafts'
          body: |
            Automated source scan completed.

            Review data/agent/drafts/*.json before approving any public update.
            High-risk items such as rules, paddle approval/ban, scores, rankings, and tournament entry details must be verified against the original source.
          branch: bot/picklelevel-update-agent
          delete-branch: true
