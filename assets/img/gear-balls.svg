<svg viewBox="0 0 960 640" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pickleball ball guide visual comparing indoor outdoor and club balls">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E7F2EE"/>
      <stop offset="0.55" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFF3CE"/>
    </linearGradient>
    <linearGradient id="out" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F4B400"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="in" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E6F5C"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect x="40" y="40" width="880" height="560" rx="48" fill="url(#bg)" stroke="#CFE5DD" stroke-width="4"/>
  <text x="90" y="125" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="42" font-weight="800" fill="#15231F">Pickleball Balls</text>
  <text x="90" y="164" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="22" fill="#5F6B66">indoor · outdoor · club practice</text>
  <g filter="url(#shadow)">
    <rect x="92" y="220" width="230" height="250" rx="28" fill="#fff" stroke="#F1DCA2" stroke-width="3"/>
    <circle cx="207" cy="325" r="70" fill="url(#out)"/>
    <g fill="#fff" opacity=".82">
      <circle cx="175" cy="300" r="8"/><circle cx="207" cy="278" r="7"/><circle cx="240" cy="306" r="8"/><circle cx="184" cy="348" r="7"/><circle cx="226" cy="360" r="8"/><circle cx="205" cy="325" r="7"/>
    </g>
    <text x="207" y="432" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="24" font-weight="800" fill="#7A5B12">OUTDOOR</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="365" y="220" width="230" height="250" rx="28" fill="#fff" stroke="#CFE5DD" stroke-width="3"/>
    <circle cx="480" cy="325" r="70" fill="url(#in)"/>
    <g fill="#fff" opacity=".78">
      <circle cx="448" cy="300" r="10"/><circle cx="482" cy="279" r="9"/><circle cx="514" cy="305" r="10"/><circle cx="457" cy="350" r="9"/><circle cx="500" cy="360" r="10"/>
    </g>
    <text x="480" y="432" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="24" font-weight="800" fill="#14513F">INDOOR</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="638" y="220" width="230" height="250" rx="28" fill="#fff" stroke="#D9E2EA" stroke-width="3"/>
    <circle cx="753" cy="325" r="70" fill="#F4B400"/>
    <path d="M699 325c34-58 78-58 108 0M702 344c34 34 72 34 102 0" fill="none" stroke="#fff" stroke-width="9" stroke-linecap="round" opacity=".82"/>
    <text x="753" y="432" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="24" font-weight="800" fill="#1E6F5C">CLUB</text>
  </g>
  <text x="480" y="535" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="22" fill="#5F6B66">Match the ball to the court, event, and local club.</text>
</svg>