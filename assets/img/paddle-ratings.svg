<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Paddle ratings comparison</title>
  <desc id="desc">A comparison board for paddle power, control, spin, forgiveness, and hand speed.</desc>
  <rect width="720" height="420" rx="28" fill="#fbfaf5"/>
  <rect x="70" y="60" width="580" height="300" rx="22" fill="#fff" stroke="#e3e1d6" stroke-width="4"/>
  <g font-family="Inter,Arial" font-size="18" fill="#1d2421" font-weight="700">
    <text x="118" y="118">Power</text><text x="118" y="168">Control</text><text x="118" y="218">Spin</text><text x="118" y="268">Forgiveness</text><text x="118" y="318">Hands</text>
  </g>
  <g transform="translate(270 100)">
    <rect width="300" height="20" rx="10" fill="#e7f1ed"/><rect width="230" height="20" rx="10" fill="#f4b400"/>
    <rect y="50" width="300" height="20" rx="10" fill="#e7f1ed"/><rect y="50" width="260" height="20" rx="10" fill="#1E6F5C"/>
    <rect y="100" width="300" height="20" rx="10" fill="#e7f1ed"/><rect y="100" width="245" height="20" rx="10" fill="#f4b400"/>
    <rect y="150" width="300" height="20" rx="10" fill="#e7f1ed"/><rect y="150" width="210" height="20" rx="10" fill="#1E6F5C"/>
    <rect y="200" width="300" height="20" rx="10" fill="#e7f1ed"/><rect y="200" width="275" height="20" rx="10" fill="#f4b400"/>
  </g>
  <text x="112" y="52" font-family="Inter,Arial" font-size="17" font-weight="700" fill="#4f5b56">Compare by type, level, price, traits, and verified reviews</text>
</svg>
