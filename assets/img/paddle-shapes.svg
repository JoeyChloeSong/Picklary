<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Pickleball paddle shapes</title>
  <desc id="desc">Three paddle silhouettes showing widebody, hybrid, and elongated shapes.</desc>
  <rect width="720" height="420" rx="28" fill="#fbfaf5"/>
  <g transform="translate(80 42)" font-family="Inter,Arial">
    <g transform="translate(0 0)">
      <rect x="25" y="18" width="135" height="230" rx="54" fill="#e7f1ed" stroke="#1E6F5C" stroke-width="7"/>
      <rect x="74" y="234" width="38" height="80" rx="17" fill="#1E6F5C"/>
      <text x="92" y="342" text-anchor="middle" font-weight="700" font-size="20" fill="#1d2421">Widebody</text>
      <text x="92" y="367" text-anchor="middle" font-size="15" fill="#4f5b56">forgiveness</text>
    </g>
    <g transform="translate(210 0)">
      <rect x="24" y="8" width="126" height="246" rx="48" fill="#fff" stroke="#1E6F5C" stroke-width="7"/>
      <rect x="69" y="238" width="38" height="80" rx="17" fill="#1E6F5C"/>
      <path d="M42 98 H132" stroke="#f4b400" stroke-width="7" stroke-linecap="round"/><path d="M42 138 H132" stroke="#f4b400" stroke-width="7" stroke-linecap="round"/>
      <text x="87" y="342" text-anchor="middle" font-weight="700" font-size="20" fill="#1d2421">Hybrid</text>
      <text x="87" y="367" text-anchor="middle" font-size="15" fill="#4f5b56">balance</text>
    </g>
    <g transform="translate(420 0)">
      <rect x="26" y="0" width="108" height="272" rx="42" fill="#fbe9b0" stroke="#1E6F5C" stroke-width="7"/>
      <rect x="62" y="254" width="36" height="76" rx="16" fill="#1E6F5C"/>
      <text x="80" y="342" text-anchor="middle" font-weight="700" font-size="20" fill="#1d2421">Elongated</text>
      <text x="80" y="367" text-anchor="middle" font-size="15" fill="#4f5b56">reach + power</text>
    </g>
  </g>
</svg>
