  <title id="title">Pickleball shot map</title>
  <desc id="desc">A court with arcs for dink, third-shot drop, drive, and reset patterns.</desc>
  <rect width="720" height="420" rx="28" fill="#fbfaf5"/>
  <rect x="68" y="54" width="584" height="312" rx="18" fill="#e7f1ed" stroke="#1E6F5C" stroke-width="4"/>
  <line x1="360" y1="54" x2="360" y2="366" stroke="#1E6F5C" stroke-width="5"/>
  <line x1="220" y1="54" x2="220" y2="366" stroke="#1E6F5C" stroke-width="3" opacity=".45"/>
  <line x1="500" y1="54" x2="500" y2="366" stroke="#1E6F5C" stroke-width="3" opacity=".45"/>
  <path d="M130 305 C250 145 430 145 590 305" fill="none" stroke="#f4b400" stroke-width="8" stroke-linecap="round"/>
  <path d="M590 305 l-24 -5 l13 -20" fill="none" stroke="#f4b400" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M510 145 C470 115 410 115 370 145" fill="none" stroke="#1E6F5C" stroke-width="7" stroke-linecap="round"/>
