      <stop offset="0" stop-color="#1E6F5C"/><stop offset="0.5" stop-color="#F4B400"/><stop offset="1" stop-color="#5b3bdb"/>
    </linearGradient>
    <filter id="ladShadow" x="-30%" y="-30%" width="160%" height="160%">
