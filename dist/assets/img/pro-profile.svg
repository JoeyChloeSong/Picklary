  <rect x="76" y="58" width="568" height="304" rx="22" fill="#fff" stroke="#e3e1d6" stroke-width="4"/>
  <circle cx="168" cy="154" r="58" fill="#e7f1ed" stroke="#1E6F5C" stroke-width="6"/>
  <circle cx="168" cy="135" r="25" fill="#1E6F5C" opacity=".9"/><path d="M112 224c18-42 94-42 112 0" fill="#1E6F5C" opacity=".9"/>
