<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Pro player profile card</title>
  <desc id="desc">A player profile card with skills, results, DUPR, and news modules.</desc>
