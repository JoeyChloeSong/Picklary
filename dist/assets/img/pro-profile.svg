  <path d="M114 286h422" stroke="#e3e1d6" stroke-width="4"/>
  <g fill="#f4b400"><path d="M574 126h44v22c0 34-22 52-44 52s-44-18-44-52v-22h44z"/><rect x="566" y="200" width="16" height="36"/><rect x="546" y="236" width="56" height="13" rx="5"/></g>
