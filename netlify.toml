# Netlify build settings for Picklary (zero-dependency Node static site generator)
# This file must sit in the SAME folder as build.js (the repository root).
# When you connect this repo in Netlify, it reads these settings automatically —
# no need to type the build command or publish directory in the UI.

[build]
  # Netlify runs this, then publishes the folder below.
  command = "npm run build"
  publish = "dist"

# Default language routing: open the English site immediately at /en/.
# Korean remains directly available at /ko/.

# English is the default entry. Korean remains available at /ko/.
[[redirects]]
  from = "/"
  to = "/en/"
  status = 302
  force = true

[[redirects]]
  from = "/en/clip-lite/*"
  to = "/clip-lite/en/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/ko/clip-lite/*"
  to = "/clip-lite/:splat"
  status = 301
  force = true

[build.environment]
  # Pin a modern LTS Node. The build is plain Node (no packages), so this is just for stability.
  NODE_VERSION = "20"

# Security / good-practice headers for every page.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"

# Long-cache static assets (they have stable paths); HTML stays fresh by default.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ---------------------------------------------------------------------------
# Domain history cleanup: the old (pre-Picklary) e-commerce URLs are gone.
# Return 410 Gone so Google drops them from the index faster than a soft 404.
# ---------------------------------------------------------------------------
[[redirects]]
  from = "/product/*"
  to = "/410.html"
  status = 410
  force = true

[[redirects]]
  from = "/product-category/*"
  to = "/410.html"
  status = 410
  force = true

[[redirects]]
  from = "/shop/*"
  to = "/410.html"
  status = 410
  force = true

[[redirects]]
  from = "/cart/*"
  to = "/410.html"
  status = 410
  force = true

[[redirects]]
  from = "/checkout/*"
  to = "/410.html"
  status = 410
  force = true

[[redirects]]
  from = "/my-account/*"
  to = "/410.html"
  status = 410
  force = true


# Friendly aliases for the expanded Tour Board and integrated Clip Lite.
[[redirects]]
  from = "/ko/tour"
  to = "/ko/pro-scene/"
  status = 301
  force = true

[[redirects]]
  from = "/en/tour"
  to = "/en/pro-scene/"
  status = 301
  force = true

[[redirects]]
  from = "/tour"
  to = "/en/pro-scene/"
  status = 301
  force = true

[[redirects]]
  from = "/lite"
  to = "/clip-lite/en/"
  status = 301
  force = true

[[redirects]]
  from = "/download"
  to = "/picklary-lite/en/"
  status = 302
  force = true

[[redirects]]
  from = "/download/ko"
  to = "/picklary-lite/downloads/Picklary_Lite_v0.7.5_KO_Windows.zip"
  status = 302
  force = true

[[redirects]]
  from = "/download/en"
  to = "/picklary-lite/downloads/Picklary_Lite_v0.7.5_EN_Windows.zip"
  status = 302
  force = true

[[headers]]
  for = "/picklary-lite/downloads/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Disposition = "attachment"
