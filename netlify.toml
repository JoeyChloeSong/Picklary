# Netlify build settings for Picklary (zero-dependency Node static site generator)
# This file must sit in the SAME folder as build.js (the repository root).
# When you connect this repo in Netlify, it reads these settings automatically —
# no need to type the build command or publish directory in the UI.

[build]
  # Netlify runs this, then publishes the folder below.
  command = "npm run build"
  publish = "dist"

# AdSense review mode: no Edge Function language redirect.
# Keep / as a static language-choice landing page and publish only dist.
# If you re-enable a country-based redirect after approval, update Privacy Policy.

[build.environment]
  # Pin a modern LTS Node. The build is plain Node (no packages), so this is just for stability.
  NODE_VERSION = "20"

[[redirects]]
  from = "/"
  to = "/en/"
  status = 302
  force = true

# Security / good-practice headers for every page.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"

# Long-cache static assets (they have stable paths); HTML stays fresh by default.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ---------------------------------------------------------------------------
# Domain history cleanup: the old (pre-Picklary) e-commerce URLs are gone.
# Return 410 Gone so Google drops them from the index faster than a soft 404.
# ---------------------------------------------------------------------------
[[redirects]]
  from = "/product/*"
  to = "/410.html"
  status = 410
  force = true

[[redirects]]
  from = "/product-category/*"
  to = "/410.html"
  status = 410
  force = true

[[redirects]]
  from = "/shop/*"
  to = "/410.html"
  status = 410
  force = true

[[redirects]]
  from = "/cart/*"
  to = "/410.html"
  status = 410
  force = true

[[redirects]]
  from = "/checkout/*"
  to = "/410.html"
  status = 410
  force = true

[[redirects]]
  from = "/my-account/*"
  to = "/410.html"
  status = 410
  force = true


# Picklary Clip Lite: HTML remains fresh; the large local FFmpeg engine is immutable.
[[headers]]
  for = "/clip-lite/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/clip-lite/ffmpeg/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
